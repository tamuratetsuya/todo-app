<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プライム市場 スクリーニング</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --accent: #1f6feb;
    --yellow: #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    white-space: nowrap;
  }
  .logo svg { color: var(--blue); }
  .logo:hover { color: var(--blue); }

  .header-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

  .page-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* ===== TOOLBAR ===== */
  .toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-label {
    color: var(--text2);
    font-size: 12px;
    white-space: nowrap;
  }

  .filter-select, .filter-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .filter-select:hover, .filter-input:hover { border-color: var(--blue); }
  .filter-select:focus, .filter-input:focus { border-color: var(--accent); }
  .filter-input { width: 60px; }

  .btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--blue); color: var(--text); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #388bfd; border-color: #388bfd; color: #fff; }
  .btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.green { border-color: var(--green); color: var(--green); }
  .btn.green:hover { background: rgba(63,185,80,0.1); }

  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* ===== STATUS BAR ===== */
  .status-bar {
    padding: 7px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text2);
  }

  .progress-wrap {
    flex: 1;
    max-width: 300px;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s;
  }

  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== TABLE ===== */
  .table-wrap {
    flex: 1;
    overflow: auto;
    padding: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--bg2);
  }

  th {
    padding: 9px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.15s;
  }
  th:hover { color: var(--text); }
  th.sorted { color: var(--blue); }
  th .sort-icon { margin-left: 3px; opacity: 0.5; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(48,54,61,0.6);
    font-size: 12px;
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  tr:hover td { background: rgba(33,38,45,0.8); }

  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: rgba(31,111,235,0.08); }

  /* column widths */
  .col-code   { width: 70px; }
  .col-name   { width: 160px; }
  .col-sector { width: 140px; }
  .col-buy    { width: 60px; text-align: center; }
  .col-sell   { width: 60px; text-align: center; }
  .col-net    { width: 60px; text-align: center; }
  .col-close  { width: 80px; text-align: right; }
  .col-chg    { width: 70px; text-align: right; }
  .col-vol    { width: 90px; text-align: right; }
  .col-hv     { width: 70px; text-align: right; }
  .col-sigs   { min-width: 180px; }
  .col-date   { width: 60px; text-align: center; color: var(--text2); font-size: 11px; }
  .col-per    { width: 58px; text-align: right; font-size: 11px; }
  .col-pbr    { width: 48px; text-align: right; font-size: 11px; }
  .col-mcap   { width: 72px; text-align: right; font-size: 11px; }
  .col-fav    { width: 36px; text-align: center; }
  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    color: var(--text2);
    padding: 0 2px;
    line-height: 1;
    transition: color 0.1s;
  }
  .fav-btn.active { color: #f59e0b; }
  .fav-btn:hover  { color: #f59e0b; }

  .code-link {
    color: var(--blue);
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
  }
  .code-link:hover { text-decoration: underline; }

  .score-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 12px;
  }
  .score-buy  { background: rgba(63,185,80,0.15); color: var(--green); }
  .score-sell { background: rgba(248,81,73,0.15); color: var(--red); }
  .score-net-pos { background: rgba(63,185,80,0.15); color: var(--green); }
  .score-net-neg { background: rgba(248,81,73,0.15); color: var(--red); }
  .score-net-zero { background: var(--bg3); color: var(--text2); }
  .sig-date-badge {
    display: block;
    font-size: 9px;
    color: var(--text2);
    margin-top: 2px;
    white-space: nowrap;
  }

  .chg-pos { color: var(--green); }
  .chg-neg { color: var(--red); }

  .sig-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .sig-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    white-space: nowrap;
  }
  .sig-tag.buy  { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  .sig-tag.sell { background: rgba(248,81,73,0.15); color: var(--red);   border: 1px solid rgba(248,81,73,0.3); }

  .empty-msg {
    padding: 48px;
    text-align: center;
    color: var(--text2);
  }

  /* ===== COUNT BADGE ===== */
  .count-badge {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
  }

  /* ===== LAST UPDATED ===== */
  .updated-at { font-size: 11px; color: var(--text2); }
</style>
</head>
<body>

<header>
  <a href="stock.html" class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
    </svg>
    株式トレード分析
  </a>
  <div class="header-sep"></div>
  <span class="page-title">プライム市場 スクリーニング</span>
</header>

<div class="toolbar">
  <div class="filter-group">
    <span class="filter-label">最低買いスコア</span>
    <input type="number" id="minScore" class="filter-input" value="-20" min="-20" max="20">
  </div>

  <div class="filter-group">
    <span class="filter-label">売りスコア下限</span>
    <input type="number" id="maxSellScore" class="filter-input" value="" min="0" max="20" placeholder="下限なし">
  </div>

  <div class="filter-group">
    <span class="filter-label">セクター</span>
    <select id="sectorFilter" class="filter-select">
      <option value="">すべて</option>
    </select>
  </div>

  <div class="filter-group">
    <span class="filter-label">出来高(万株)</span>
    <input type="number" id="minVolume" class="filter-input" value="" min="0" placeholder="下限" style="width:70px;">
    <span class="filter-label" style="margin-left:2px;">以上</span>
  </div>

  <div class="filter-group">
    <span class="filter-label">HV(%)</span>
    <input type="number" id="minHv" class="filter-input" value="" min="0" placeholder="下限" style="width:52px;">
    <span class="filter-label">〜</span>
    <input type="number" id="maxHv" class="filter-input" value="" min="0" placeholder="上限" style="width:52px;">
  </div>

  <div class="filter-group">
    <span class="filter-label">並び替え</span>
    <select id="sortSelect" class="filter-select">
      <option value="net_score">総合スコア</option>
      <option value="buy_score">買いスコア</option>
      <option value="sell_score">売りスコア</option>
      <option value="change_pct">騰落率</option>
      <option value="close">終値</option>
      <option value="volume_avg">出来高</option>
      <option value="hv">HV</option>
    </select>
  </div>

  <button class="btn green" onclick="loadScreening()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    スクリーニング実行
  </button>

  <div class="toolbar-right">
    <button class="btn primary" id="updateBtn" onclick="startUpdate()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      株価データ更新
    </button>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <div class="spinner" id="spinner"></div>
  <span id="statusText">読み込み中...</span>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <span class="count-badge" id="countBadge" style="display:none"></span>
  <span class="updated-at" id="updatedAt"></span>
</div>

<div class="table-wrap">
  <table id="screeningTable">
    <thead>
      <tr>
        <th class="col-fav">★</th>
        <th class="col-code" data-col="code">コード <span class="sort-icon">↕</span></th>
        <th class="col-name" data-col="name">銘柄名 <span class="sort-icon">↕</span></th>
        <th class="col-sector" data-col="sector">セクター <span class="sort-icon">↕</span></th>
        <th class="col-buy" data-col="buy_score">買い <span class="sort-icon">↕</span></th>
        <th class="col-sell" data-col="sell_score">売り <span class="sort-icon">↕</span></th>
        <th class="col-net" data-col="net_score">総合 <span class="sort-icon">↕</span></th>
        <th class="col-close" data-col="close">終値 <span class="sort-icon">↕</span></th>
        <th class="col-date" data-col="price_date">日付 <span class="sort-icon">↕</span></th>
        <th class="col-chg" data-col="change_pct">騰落率 <span class="sort-icon">↕</span></th>
        <th class="col-per"  data-col="per">PER <span class="sort-icon">↕</span></th>
        <th class="col-pbr"  data-col="pbr">PBR <span class="sort-icon">↕</span></th>
        <th class="col-mcap" data-col="market_cap">時価総額 <span class="sort-icon">↕</span></th>
        <th class="col-vol" data-col="volume_avg">出来高(万株) <span class="sort-icon">↕</span></th>
        <th class="col-hv"  data-col="hv">HV(%) <span class="sort-icon">↕</span></th>
        <th class="col-sigs">シグナル</th>
      </tr>
    </thead>
    <tbody id="screeningBody">
      <tr><td colspan="15" class="empty-msg">データを読み込み中...</td></tr>
    </tbody>
  </table>
</div>

<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:8020' : '/api/stock';

let allData = [];
let filteredData = [];
let sortCol = 'net_score';
let sortAsc = false;
let pollTimer = null;
let favorites = new Set();

// ===== FAVORITES =====
async function loadFavorites() {
  try {
    const res = await fetch(`${API}/favorites`);
    if (res.ok) {
      const list = await res.json();
      // [{code,name}] 形式に対応（旧string[]も互換）
      favorites = new Set(list.map(d => typeof d === 'string' ? d : d.code));
      // テーブルが表示済みなら★を更新
      document.querySelectorAll('.fav-btn[data-code]').forEach(btn => {
        const code = btn.dataset.code;
        const active = favorites.has(code);
        btn.textContent = active ? '★' : '☆';
        btn.classList.toggle('active', active);
      });
    }
  } catch(e) {}
}

async function toggleFavorite(code, btn) {
  if (favorites.has(code)) {
    favorites.delete(code);
    btn.textContent = '☆';
    btn.classList.remove('active');
    fetch(`${API}/favorites/${encodeURIComponent(code)}`, {method: 'DELETE'}).catch(() => {});
  } else {
    favorites.add(code);
    btn.textContent = '★';
    btn.classList.add('active');
    fetch(`${API}/favorites/${encodeURIComponent(code)}`, {method: 'POST'}).catch(() => {});
  }
}

// タブがアクティブになったとき再同期
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadFavorites();
});

// ===== INIT =====
async function init() {
  await loadSectors();
  await loadFavorites();
  await checkStatus();
  await loadScreening();
}

// ===== SECTORS =====
async function loadSectors() {
  try {
    const res = await fetch(`${API}/screening/sectors`);
    if (!res.ok) return;
    const sectors = await res.json();
    const sel = document.getElementById('sectorFilter');
    sectors.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      sel.appendChild(opt);
    });
  } catch(e) {}
}

// ===== LOAD SCREENING =====
async function loadScreening() {
  const minScore = parseInt(document.getElementById('minScore').value) || 0;
  const sector   = document.getElementById('sectorFilter').value;
  const sort     = document.getElementById('sortSelect').value;

  setStatus('読み込み中...', true);

  try {
    const params = new URLSearchParams({ min_score: minScore, sort });
    if (sector) params.set('sector', sector);
    const res = await fetch(`${API}/screening?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allData = await res.json();
    sortCol = sort;
    sortAsc = false;
    applyFilters();
  } catch(e) {
    setStatus('取得失敗: ' + e.message, false);
    renderEmpty('データ取得に失敗しました。バックエンドが起動していることを確認してください。');
  }
}

// ===== CLIENT FILTER (出来高・HV) =====
function applyFilters() {
  const minVol = parseFloat(document.getElementById('minVolume').value);
  const minHv  = parseFloat(document.getElementById('minHv').value);
  const maxHv  = parseFloat(document.getElementById('maxHv').value);

  const maxSellScore = parseInt(document.getElementById('maxSellScore').value);

  filteredData = allData.filter(r => {
    if (!isNaN(minVol) && minVol > 0) {
      const vol = (r.volume_avg || 0) / 10000;
      if (vol < minVol) return false;
    }
    if (!isNaN(minHv) && minHv > 0 && (r.hv == null || r.hv < minHv)) return false;
    if (!isNaN(maxHv) && maxHv > 0 && (r.hv == null || r.hv > maxHv)) return false;
    if (!isNaN(maxSellScore) && maxSellScore > 0 && (r.sell_score || 0) < maxSellScore) return false;
    return true;
  });

  renderTable();
  setStatus(`${filteredData.length}件`, false);
  updateSortHeaders();
}

// ===== STATUS CHECK =====
async function checkStatus() {
  try {
    const res = await fetch(`${API}/screening/status`);
    if (!res.ok) return;
    const s = await res.json();
    if (s.updated_at) {
      document.getElementById('updatedAt').textContent = `更新: ${s.updated_at}`;
    }
    if (s.running) {
      startPolling();
    }
  } catch(e) {}
}

// ===== UPDATE =====
async function startUpdate() {
  const btn = document.getElementById('updateBtn');
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/screening/update`, { method: 'POST' });
    const data = await res.json();
    if (data.message === 'already running') {
      setStatus('すでに更新中です', false);
    } else {
      setStatus('株価データ更新を開始しました（数分かかります）', false);
      startPolling();
    }
  } catch(e) {
    setStatus('更新開始に失敗しました: ' + e.message, false);
    btn.disabled = false;
  }
}

function startPolling() {
  if (pollTimer) return;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';
  pollTimer = setInterval(pollStatus, 2000);
}

async function pollStatus() {
  try {
    const res = await fetch(`${API}/screening/status`);
    if (!res.ok) return;
    const s = await res.json();

    if (s.total > 0) {
      const pct = Math.round(s.progress / s.total * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('statusText').textContent = `更新中... ${s.progress}/${s.total}`;
    }

    if (!s.running) {
      clearInterval(pollTimer);
      pollTimer = null;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('updateBtn').disabled = false;
      if (s.updated_at) {
        document.getElementById('updatedAt').textContent = `更新: ${s.updated_at}`;
      }
      if (s.error) {
        setStatus('更新エラー: ' + s.error, false);
      } else {
        await loadSectors();
        await loadScreening();  // loadScreening内でapplyFiltersも呼ばれる
      }
    }
  } catch(e) {}
}

// ===== RENDER =====
function renderTable() {
  const tbody = document.getElementById('screeningBody');
  if (!filteredData.length) {
    renderEmpty('条件に一致する銘柄がありません。スクリーニング条件を変更するか、株価データを更新してください。');
    return;
  }

  const rows = [...filteredData];
  rows.sort((a, b) => {
    let av = a[sortCol];
    let bv = b[sortCol];
    if (av == null) av = sortAsc ? Infinity : -Infinity;
    if (bv == null) bv = sortAsc ? Infinity : -Infinity;
    if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortAsc ? av - bv : bv - av;
  });

  tbody.innerHTML = rows.map(r => buildRow(r)).join('');

  document.getElementById('countBadge').style.display = '';
  document.getElementById('countBadge').textContent = `${filteredData.length}件`;

  // PER/PBR/時価総額が未取得の銘柄をバックグラウンドで取得
  const missing = rows.filter(r => r.per == null && r.pbr == null && r.market_cap == null).map(r => r.code);
  if (missing.length) fetchFinancialsBatch(missing);
}

function buildRow(r) {
  const code = r.code || '';
  const codeBase = code.replace('.T', '');
  const name = escHtml(r.name || '');
  const sector = escHtml(r.sector || '');

  const buy  = r.buy_score  || 0;
  const sell = r.sell_score || 0;
  const net  = r.net_score  || 0;

  const close = r.close != null ? Number(r.close).toLocaleString('ja-JP', {minimumFractionDigits: 0, maximumFractionDigits: 1}) : '-';
  const chgPct = r.change_pct != null ? r.change_pct.toFixed(2) : null;
  const chgClass = chgPct == null ? '' : (chgPct >= 0 ? 'chg-pos' : 'chg-neg');
  const chgStr = chgPct == null ? '-' : (chgPct >= 0 ? `+${chgPct}%` : `${chgPct}%`);

  const netClass = net > 0 ? 'score-net-pos' : (net < 0 ? 'score-net-neg' : 'score-net-zero');

  const buySigs  = (r.buy_signals  || []).map(s => `<span class="sig-tag buy">${escHtml(s)}</span>`).join('');
  const sellSigs = (r.sell_signals || []).map(s => `<span class="sig-tag sell">${escHtml(s)}</span>`).join('');

  // 出来高（万株）
  const volStr = r.volume_avg != null
    ? (r.volume_avg / 10000).toLocaleString('ja-JP', {maximumFractionDigits: 0})
    : '-';

  // HV
  const hvStr = r.hv != null ? r.hv.toFixed(1) + '%' : '-';
  const hvClass = r.hv == null ? '' : r.hv >= 50 ? 'chg-neg' : r.hv <= 20 ? 'chg-pos' : '';

  const priceDate = r.price_date ? (() => { const p = r.price_date.slice(0,10); return p.slice(5).replace('-', '/'); })() : '-';

  // PER / PBR / 時価総額
  const perStr  = r.per  != null ? Number(r.per).toFixed(1)  + '倍' : '-';
  const pbrStr  = r.pbr  != null ? Number(r.pbr).toFixed(2)  + '倍' : '-';
  const mcapStr = r.market_cap != null ? (() => {
    const v = r.market_cap;
    if (v >= 1e12) return (v/1e12).toFixed(1) + '兆';
    if (v >= 1e8)  return (v/1e8).toFixed(0)  + '億';
    return (v/1e4).toFixed(0) + '万';
  })() : '-';

  const isFav = favorites.has(code);
  return `<tr class="clickable" onclick="openStock('${code}')">
    <td class="col-fav"><button class="fav-btn${isFav ? ' active' : ''}" data-code="${code}" onclick="event.stopPropagation();toggleFavorite('${code}',this)">${isFav ? '★' : '☆'}</button></td>
    <td class="col-code"><a class="code-link" onclick="event.stopPropagation();openStock('${code}')">${codeBase}</a></td>
    <td class="col-name">${name}</td>
    <td class="col-sector">${sector}</td>
    <td class="col-buy" style="text-align:center"><span class="score-badge score-buy">${buy}</span></td>
    <td class="col-sell" style="text-align:center"><span class="score-badge score-sell">${sell}</span></td>
    <td class="col-net" style="text-align:center"><span class="score-badge ${netClass}">${net}</span></td>
    <td class="col-close" style="text-align:right">${close}</td>
    <td class="col-date">${priceDate}</td>
    <td class="col-chg ${chgClass}" style="text-align:right">${chgStr}</td>
    <td class="col-per"  id="per-${code}"  style="text-align:right;color:var(--text2)">${perStr}</td>
    <td class="col-pbr"  id="pbr-${code}"  style="text-align:right;color:var(--text2)">${pbrStr}</td>
    <td class="col-mcap" id="mcap-${code}" style="text-align:right;color:var(--text2)">${mcapStr}</td>
    <td class="col-vol" style="text-align:right">${volStr}</td>
    <td class="col-hv ${hvClass}" style="text-align:right">${hvStr}</td>
    <td class="col-sigs"><div class="sig-tags">${buySigs}${sellSigs}</div></td>
  </tr>`;
}

let _finBatchTimer = null;
async function fetchFinancialsBatch(codes) {
  clearTimeout(_finBatchTimer);
  const BATCH = 6;
  const DELAY = 400; // ms between batches

  for (let i = 0; i < codes.length; i += BATCH) {
    const batch = codes.slice(i, i + BATCH);
    await Promise.all(batch.map(async code => {
      try {
        const res = await fetch(`${API}/company_financials?symbol=${encodeURIComponent(code)}`);
        if (!res.ok) return;
        const d = await res.json();
        // allDataのレコードを更新
        const rec = allData.find(r => r.code === code);
        if (rec) {
          if (d.per != null) rec.per = d.per;
          if (d.pbr != null) rec.pbr = d.pbr;
          if (d.market_cap != null) rec.market_cap = d.market_cap;
        }
        // セルをDOMに直接反映（再描画不要）
        const fmtPer  = d.per  != null ? Number(d.per).toFixed(1) + '倍' : '-';
        const fmtPbr  = d.pbr  != null ? Number(d.pbr).toFixed(2) + '倍' : '-';
        const fmtMcap = d.market_cap != null ? (() => {
          const v = d.market_cap;
          if (v >= 1e12) return (v/1e12).toFixed(1) + '兆';
          if (v >= 1e8)  return (v/1e8).toFixed(0)  + '億';
          return (v/1e4).toFixed(0) + '万';
        })() : '-';
        const elPer  = document.getElementById(`per-${code}`);
        const elPbr  = document.getElementById(`pbr-${code}`);
        const elMcap = document.getElementById(`mcap-${code}`);
        if (elPer)  elPer.textContent  = fmtPer;
        if (elPbr)  elPbr.textContent  = fmtPbr;
        if (elMcap) elMcap.textContent = fmtMcap;
      } catch(e) {}
    }));
    if (i + BATCH < codes.length) await new Promise(r => setTimeout(r, DELAY));
  }
}

function openStock(code) {
  const item = filteredData.find(r => r.code === code) || allData.find(r => r.code === code);
  const name = item ? item.name : '';
  const url = `stock.html?code=${encodeURIComponent(code)}` + (name ? `&name=${encodeURIComponent(name)}` : '');
  window.open(url, '_blank');
}

function renderEmpty(msg) {
  document.getElementById('screeningBody').innerHTML =
    `<tr><td colspan="15" class="empty-msg">${escHtml(msg)}</td></tr>`;
  document.getElementById('countBadge').style.display = 'none';
}

// ===== SORT =====
function updateSortHeaders() {
  document.querySelectorAll('th[data-col]').forEach(th => {
    const col = th.dataset.col;
    th.classList.toggle('sorted', col === sortCol);
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = col === sortCol ? (sortAsc ? '↑' : '↓') : '↕';
  });
}

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (col === 'col-sigs' || col === 'col-fav') return;
    if (sortCol === col) {
      sortAsc = !sortAsc;
    } else {
      sortCol = col;
      sortAsc = false;
    }
    renderTable();
    updateSortHeaders();
  });
});

// ===== FILTER CHANGE =====
document.getElementById('minScore').addEventListener('change', loadScreening);
document.getElementById('maxSellScore').addEventListener('change', applyFilters);
document.getElementById('sectorFilter').addEventListener('change', loadScreening);
document.getElementById('minVolume').addEventListener('change', applyFilters);
document.getElementById('minHv').addEventListener('change', applyFilters);
document.getElementById('maxHv').addEventListener('change', applyFilters);
document.getElementById('sortSelect').addEventListener('change', () => {
  sortCol = document.getElementById('sortSelect').value;
  sortAsc = false;
  applyFilters();
});

// ===== STATUS =====
function setStatus(msg, loading) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
}

// ===== UTIL =====
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
