<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO アプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 520px;
      height: fit-content;
    }

    h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 24px; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f7df3; }

    .input-row button {
      padding: 10px 18px;
      background: #4f7df3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3a65d8; }
    .input-row button:disabled { background: #aaa; cursor: not-allowed; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 6px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #4f7df3;
      color: #4f7df3;
      font-weight: 600;
    }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:last-child { border-bottom: none; }

    .todo-item input[type="checkbox"] {
      width: 18px; height: 18px;
      cursor: pointer;
      accent-color: #4f7df3;
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-all;
    }

    .todo-text.done { text-decoration: line-through; color: #aaa; }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: #e53935; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 15px;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #999;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }

    .clear-btn:hover { color: #e53935; }

    .status {
      font-size: 12px;
      margin-top: 8px;
      text-align: right;
    }

    .status.ok { color: #4caf50; }
    .status.error { color: #e53935; }
    .status.loading { color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TODO</h1>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="新しいタスクを入力..." />
      <button id="addBtn" onclick="addTodo()">追加</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">すべて</button>
      <button onclick="setFilter('active', this)">未完了</button>
      <button onclick="setFilter('done', this)">完了済み</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer">
      <span id="countLabel"></span>
      <button class="clear-btn" onclick="clearDone()">完了済みを削除</button>
    </div>
    <div class="status loading" id="status">読み込み中...</div>
  </div>

  <script>
    // ★ デプロイ後にEC2のパブリックIPまたはドメインに変更してください
    const API = 'https://www.golfspace.jp/api/todos';

    let todos = [];
    let filter = 'all';

    function setStatus(msg, type = 'ok') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    async function fetchTodos() {
      try {
        const res = await fetch(`${API}/todos`);
        if (!res.ok) throw new Error();
        todos = await res.json();
        render();
        setStatus('同期済み ✓', 'ok');
      } catch {
        setStatus('サーバーに接続できません', 'error');
      }
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done : t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">タスクがありません</li>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="todo-item">
            <input type="checkbox" ${t.done ? 'checked' : ''}
              onchange="toggle(${t.id}, this.checked)" />
            <span class="todo-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</span>
            <button class="delete-btn" onclick="remove(${t.id})">×</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('countLabel').textContent =
        `残り ${remaining} 件 / 合計 ${todos.length} 件`;
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      try {
        const res = await fetch(`${API}/todos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!res.ok) throw new Error();
        input.value = '';
        await fetchTodos();
      } catch {
        setStatus('追加に失敗しました', 'error');
      } finally {
        btn.disabled = false;
      }
    }

    async function toggle(id, done) {
      try {
        await fetch(`${API}/todos/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done })
        });
        await fetchTodos();
      } catch {
        setStatus('更新に失敗しました', 'error');
      }
    }

    async function remove(id) {
      try {
        await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
        await fetchTodos();
      } catch {
        setStatus('削除に失敗しました', 'error');
      }
    }

    async function clearDone() {
      const doneTodos = todos.filter(t => t.done);
      try {
        await Promise.all(doneTodos.map(t =>
          fetch(`${API}/todos/${t.id}`, { method: 'DELETE' })
        ));
        await fetchTodos();
      } catch {
        setStatus('削除に失敗しました', 'error');
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    fetchTodos();
  </script>
</body>
</html>
