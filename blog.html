<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Space | ゴルフブログ</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f7f2;
      --surface: #ffffff;
      --surface2: #f5faf6;
      --border: rgba(0,0,0,0.08);
      --green: #1a7a3e;
      --green-dim: #2d8a50;
      --text: #1a2e22;
      --text-muted: rgba(26,46,34,0.45);
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'ヒラギノ角ゴ ProN', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ Pro', 'Hiragino Kaku Gothic Pro', 'メイリオ', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(240,247,242,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .logo h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: 5px;
      color: var(--text);
      text-transform: uppercase;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-bottom: 2px;
      box-shadow: 0 0 8px var(--green);
    }

    .logo sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 4px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .admin-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green-dim);
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .admin-btn:hover {
      background: var(--green);
      color: var(--bg);
      box-shadow: 0 0 24px rgba(74,222,128,0.3);
    }

    @media (max-width: 480px) {
      header { padding: 14px 16px; }
      .logo h1 { font-size: 22px; letter-spacing: 3px; }
      .logo sub { display: none; }
      .logo-dot { display: none; }
      .admin-btn { padding: 8px 14px; font-size: 12px; letter-spacing: 0.5px; }
    }

    /* ── メイン ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .feed-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .feed-header-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .feed-header-label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── 投稿カード ── */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── メディアグリッド ── */
    .post-card .media-grid {
      display: grid;
      gap: 3px;
      padding: 16px;
      padding-bottom: 0;
    }

    .post-card .media-grid.count-1 { grid-template-columns: 33%; }
    .post-card .media-grid.count-2 { grid-template-columns: 1fr 1fr; max-width: 66%; }
    .post-card .media-grid.count-3 { grid-template-columns: 1fr 1fr 1fr; }
    .post-card .media-grid.count-many { grid-template-columns: 1fr 1fr 1fr; }

    .post-card .media-grid img,
    .post-card .media-grid video {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      border-radius: 12px;
      transition: transform 0.3s ease, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .post-card .media-grid img:hover,
    .post-card .media-grid video:hover {
      transform: scale(1.02);
      opacity: 0.9;
    }

    .media-item {
      overflow: hidden;
      position: relative;
      border-radius: 12px;
    }

    .media-item .more-badge {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 26px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 12px;
      backdrop-filter: blur(4px);
    }

    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .play-btn svg {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
      opacity: 0.9;
      transition: opacity 0.2s, transform 0.2s;
    }

    .media-item:hover .play-btn svg {
      opacity: 1;
      transform: scale(1.1);
    }

    /* ── 投稿本文 ── */
    .post-body {
      padding: 20px 24px 24px;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .post-meta::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
    }

    .post-title {
      font-family: 'ヒラギノ角ゴ ProN', 'Hiragino Kaku Gothic ProN', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
      letter-spacing: 0.5px;
    }

    .post-text {
      font-family: 'ヒラギノ角ゴ ProN', 'Hiragino Kaku Gothic ProN', sans-serif;
      font-size: 15px;
      font-weight: 300;
      font-style: normal;
      color: #3a5242;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      letter-spacing: 0.3px;
    }

    .post-actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
    }

    .delete-btn, .edit-btn {
      background: none;
      border: none;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .delete-btn { color: var(--text-muted); }
    .delete-btn:hover { color: #f87171; }
    .edit-btn { color: var(--text-muted); margin-right: 12px; }
    .edit-btn:hover { color: var(--green); }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
      margin-right: 12px;
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 11px;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .copy-btn:hover { color: var(--green); border-color: var(--green-dim); }
    .copy-btn.copied { color: var(--green); border-color: var(--green-dim); background: rgba(26,122,62,0.08); }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 80px 0;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* ── モーダル ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,46,34,0.5);
      backdrop-filter: blur(12px);
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 16px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-family: 'ヒラギノ明朝 ProN', 'Hiragino Mincho ProN', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--green-dim);
    }

    .form-group textarea { min-height: 120px; resize: vertical; }

    .file-drop {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 1px;
      transition: all 0.2s;
      background: var(--surface2);
    }

    .file-drop:hover, .file-drop.dragover {
      border-color: var(--green-dim);
      color: var(--green);
    }

    .file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .file-preview .thumb {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .file-preview .thumb img,
    .file-preview .thumb video {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .file-preview .thumb .remove {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #f87171;
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
      line-height: 20px;
      text-align: center;
      padding: 0;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn-primary {
      padding: 11px 24px;
      background: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary:hover { box-shadow: 0 0 24px rgba(74,222,128,0.4); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      padding: 11px 20px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .error-msg {
      color: #f87171;
      font-size: 12px;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    /* ── ライトボックス ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      justify-content: center;
      align-items: center;
      z-index: 200;
      backdrop-filter: blur(20px);
    }

    .lightbox.open { display: flex; }

    .lightbox img, .lightbox video {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 12px;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      color: rgba(255,255,255,0.5);
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: white; }

    /* ── リンクプレビューカード ── */
    .link-cards {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .link-card:hover {
      border-color: var(--green-dim);
      box-shadow: 0 4px 20px rgba(26,122,62,0.12);
    }

    .link-card-img {
      width: 110px;
      min-width: 110px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .link-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .link-card-body {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }

    .link-card-site {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--green);
      font-weight: 500;
    }

    .link-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }

    .link-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.5;
      margin-top: 2px;
    }

    .link-card-url {
      font-size: 10px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 4px;
      opacity: 0.6;
    }

    .post-title-link {
      display: block;
      text-decoration: none;
      color: var(--text);
      transition: color 0.2s;
    }

    .post-title-link:hover {
      color: var(--green);
    }

    .read-more {
      display: inline-block;
      margin-top: 10px;
      font-size: 13px;
      color: var(--green);
      text-decoration: none;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(26,122,62,0.3);
      transition: border-color 0.2s;
    }

    .read-more:hover {
      border-color: var(--green);
    }

    /* スクロールバー */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Golf Space</h1>
    <div class="logo-dot"></div>
    <sub>Journal</sub>
  </div>
  <button class="admin-btn" onclick="openPostModal()">&#43; 投稿</button>
</header>

<main>
  <div class="feed-header">
    <div class="feed-header-line"></div>
    <div class="feed-header-label">Latest Posts</div>
    <div class="feed-header-line"></div>
  </div>
  <div id="postList"></div>
</main>

<!-- 投稿モーダル -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <h2>New Post</h2>
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="postTitle" placeholder="タイトルを入力..." />
    </div>
    <div class="form-group">
      <label>本文</label>
      <textarea id="postBody" placeholder="本文を入力..."></textarea>
    </div>
    <div class="form-group">
      <label>写真・動画</label>
      <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
        クリックまたはドラッグ&ドロップで追加
      </div>
      <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none" onchange="handleFiles(this.files)" />
      <div class="file-preview" id="filePreview"></div>
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="postPassword" placeholder="管理者パスワード" />
    </div>
    <div class="error-msg" id="postError"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closePostModal()">キャンセル</button>
      <button class="btn-primary" id="submitBtn" onclick="submitPost()">投稿する</button>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>記事を編集</h2>
    <input type="hidden" id="editPostId" />
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="editTitle" placeholder="タイトルを入力..." />
    </div>
    <div class="form-group">
      <label>本文</label>
      <textarea id="editBody" placeholder="本文を入力..."></textarea>
    </div>
    <div class="form-group">
      <label>写真・動画を追加</label>
      <div class="file-drop" id="editFileDrop" onclick="document.getElementById('editFileInput').click()">
        クリックまたはドラッグ&ドロップで追加
      </div>
      <input type="file" id="editFileInput" accept="image/*,video/*" multiple style="display:none" onchange="handleEditFiles(this.files)" />
      <div class="file-preview" id="editFilePreview"></div>
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="editPassword" placeholder="管理者パスワード" />
    </div>
    <div class="error-msg" id="editError"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeEditModal()">キャンセル</button>
      <button class="btn-primary" id="editSubmitBtn" onclick="submitEdit()">保存する</button>
    </div>
  </div>
</div>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div id="lightboxContent"></div>
</div>

<script>
  const API = 'https://blog.golfspace.jp/api/blog';
  let selectedFiles = [];

  async function loadPosts() {
    const list = document.getElementById('postList');
    try {
      const res = await fetch(`${API}/posts`);
      const posts = await res.json();
      if (posts.length === 0) {
        list.innerHTML = '<div class="empty">— NO POSTS YET —</div>';
        return;
      }
      list.innerHTML = posts.map((p, i) => renderPost(p, i)).join('');
      enrichWithOGP(posts);
    } catch {
      list.innerHTML = '<div class="empty">— CONNECTION ERROR —</div>';
    }
  }

  const BODY_LIMIT = 100;

  function renderPost(p, i) {
    const date = new Date(p.created_at).toLocaleDateString('ja-JP', {
      year: 'numeric', month: 'long', day: 'numeric'
    });

    let mediaHtml = '';
    if (p.media && p.media.length > 0) {
      const count = p.media.length;
      const gridClass = count === 1 ? 'count-1' : count === 2 ? 'count-2' : count === 3 ? 'count-3' : 'count-many';
      const displayMedia = count > 4 ? p.media.slice(0, 4) : p.media;
      const remaining = count > 4 ? count - 4 : 0;

      const items = displayMedia.map((m, idx) => {
        const isLast = remaining > 0 && idx === displayMedia.length - 1;
        const badge = isLast ? `<div class="more-badge" onclick="openLightbox('image','${m.url}')">+${remaining}</div>` : '';
        const playBtn = `<div class="play-btn"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="24" fill="rgba(0,0,0,0.45)"/><polygon points="19,14 38,24 19,34" fill="white"/></svg></div>`;
        const media = m.media_type === 'video'
          ? `<video src="${m.url}#t=0.001" muted playsinline preload="metadata"></video>${playBtn}`
          : `<img src="${m.url}" onclick="openLightbox('image','${m.url}')" loading="lazy" />`;
        return `<div class="media-item" ${m.media_type === 'video' ? `onclick="openLightbox('video','${m.url}')" style="cursor:pointer"` : ''}>${media}${badge}</div>`;
      }).join('');

      mediaHtml = `<div class="media-grid ${gridClass}">${items}</div>`;
    }

    const bodyFull = p.body;
    const bodyTruncated = bodyFull.length > BODY_LIMIT ? bodyFull.slice(0, BODY_LIMIT) + '…' : bodyFull;
    const readMoreHtml = bodyFull.length > BODY_LIMIT
      ? `<a class="read-more" href="blog-post.html?id=${p.id}">続きを読む</a>`
      : '';

    return `
      <div class="post-card" style="animation-delay:${i * 0.08}s">
        ${mediaHtml}
        <div class="post-body">
          <div class="post-meta">${date}</div>
          <a class="post-title post-title-link" href="blog-post.html?id=${p.id}">${escapeHtml(p.title)}</a>
          <div class="post-text">${escapeHtml(bodyTruncated)}</div>
          ${readMoreHtml}
          <div class="post-actions">
            <button class="copy-btn" id="copy-${p.id}" onclick="copyText(${p.id}, \`${escapeHtml(p.body)}\`)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              コピー
            </button>
            <button class="edit-btn" onclick="openEditModal(${p.id}, \`${escapeHtml(p.title)}\`, \`${escapeHtml(p.body)}\`)">編集</button>
            <button class="delete-btn" onclick="deletePost(${p.id})">削除</button>
          </div>
        </div>
      </div>`;
  }

  function openPostModal() {
    document.getElementById('postModal').classList.add('open');
    document.getElementById('postTitle').focus();
  }

  function closePostModal() {
    document.getElementById('postModal').classList.remove('open');
    document.getElementById('postTitle').value = '';
    document.getElementById('postBody').value = '';
    document.getElementById('postPassword').value = '';
    document.getElementById('postError').textContent = '';
    selectedFiles = [];
    document.getElementById('filePreview').innerHTML = '';
  }

  function handleFiles(files) {
    for (const f of files) selectedFiles.push(f);
    renderPreviews();
  }

  function renderPreviews() {
    const preview = document.getElementById('filePreview');
    preview.innerHTML = selectedFiles.map((f, i) => {
      const url = URL.createObjectURL(f);
      const isVideo = f.type.startsWith('video/');
      return `<div class="thumb">
        ${isVideo ? `<video src="${url}" muted></video>` : `<img src="${url}" />`}
        <button class="remove" onclick="removeFile(${i})">×</button>
      </div>`;
    }).join('');
  }

  function removeFile(i) {
    selectedFiles.splice(i, 1);
    renderPreviews();
  }

  const fileDrop = document.getElementById('fileDrop');
  fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('dragover'); });
  fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
  fileDrop.addEventListener('drop', e => {
    e.preventDefault();
    fileDrop.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  async function submitPost() {
    const title = document.getElementById('postTitle').value.trim();
    const body = document.getElementById('postBody').value.trim();
    const password = document.getElementById('postPassword').value;
    const errEl = document.getElementById('postError');
    errEl.textContent = '';

    if (!title) { errEl.textContent = 'タイトルを入力してください'; return; }
    if (!body)  { errEl.textContent = '本文を入力してください'; return; }
    if (!password) { errEl.textContent = 'パスワードを入力してください'; return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '投稿中...';

    const fd = new FormData();
    fd.append('title', title);
    fd.append('body', body);
    fd.append('password', password);
    for (const f of selectedFiles) fd.append('files', f);

    try {
      const res = await fetch(`${API}/posts`, { method: 'POST', body: fd });
      if (res.status === 401) { errEl.textContent = 'パスワードが違います'; return; }
      if (!res.ok) throw new Error();
      closePostModal();
      loadPosts();
    } catch {
      errEl.textContent = '投稿に失敗しました';
    } finally {
      btn.disabled = false;
      btn.textContent = '投稿する';
    }
  }

  function copyText(id, text) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(`copy-${id}`);
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> コピー済み`;
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> コピー`;
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  let editSelectedFiles = [];

  function handleEditFiles(files) {
    for (const f of files) editSelectedFiles.push(f);
    renderEditPreviews();
  }

  function renderEditPreviews() {
    const preview = document.getElementById('editFilePreview');
    preview.innerHTML = editSelectedFiles.map((f, i) => {
      const url = URL.createObjectURL(f);
      const isVideo = f.type.startsWith('video/');
      return `<div class="thumb">
        ${isVideo ? `<video src="${url}" muted></video>` : `<img src="${url}" />`}
        <button class="remove" onclick="removeEditFile(${i})">×</button>
      </div>`;
    }).join('');
  }

  function removeEditFile(i) {
    editSelectedFiles.splice(i, 1);
    renderEditPreviews();
  }

  function openEditModal(id, title, body) {
    document.getElementById('editPostId').value = id;
    document.getElementById('editTitle').value = title;
    document.getElementById('editBody').value = body;
    document.getElementById('editPassword').value = '';
    document.getElementById('editError').textContent = '';
    editSelectedFiles = [];
    document.getElementById('editFilePreview').innerHTML = '';
    document.getElementById('editFileInput').value = '';
    document.getElementById('editModal').classList.add('open');
    document.getElementById('editTitle').focus();
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
  }

  const editFileDrop = document.getElementById('editFileDrop');
  editFileDrop.addEventListener('dragover', e => { e.preventDefault(); editFileDrop.classList.add('dragover'); });
  editFileDrop.addEventListener('dragleave', () => editFileDrop.classList.remove('dragover'));
  editFileDrop.addEventListener('drop', e => {
    e.preventDefault();
    editFileDrop.classList.remove('dragover');
    handleEditFiles(e.dataTransfer.files);
  });

  async function submitEdit() {
    const id = document.getElementById('editPostId').value;
    const title = document.getElementById('editTitle').value.trim();
    const body = document.getElementById('editBody').value.trim();
    const password = document.getElementById('editPassword').value;
    const errEl = document.getElementById('editError');
    errEl.textContent = '';

    if (!title) { errEl.textContent = 'タイトルを入力してください'; return; }
    if (!body)  { errEl.textContent = '本文を入力してください'; return; }
    if (!password) { errEl.textContent = 'パスワードを入力してください'; return; }

    const btn = document.getElementById('editSubmitBtn');
    btn.disabled = true;
    btn.textContent = '保存中...';

    try {
      const res = await fetch(`${API}/posts/${id}?password=${encodeURIComponent(password)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body })
      });
      if (res.status === 401) { errEl.textContent = 'パスワードが違います'; return; }
      if (!res.ok) throw new Error();

      if (editSelectedFiles.length > 0) {
        const fd = new FormData();
        fd.append('password', password);
        for (const f of editSelectedFiles) fd.append('files', f);
        await fetch(`${API}/posts/${id}/media`, { method: 'POST', body: fd });
      }

      closeEditModal();
      loadPosts();
    } catch {
      errEl.textContent = '保存に失敗しました';
    } finally {
      btn.disabled = false;
      btn.textContent = '保存する';
    }
  }

  async function deletePost(id) {
    const password = prompt('管理者パスワードを入力してください：');
    if (!password) return;
    try {
      const res = await fetch(`${API}/posts/${id}?password=${encodeURIComponent(password)}`, { method: 'DELETE' });
      if (res.status === 401) { alert('パスワードが違います'); return; }
      loadPosts();
    } catch {
      alert('削除に失敗しました');
    }
  }

  function openLightbox(type, url) {
    const content = document.getElementById('lightboxContent');
    content.innerHTML = type === 'video'
      ? `<video src="${url}" controls autoplay style="max-width:95vw;max-height:95vh;border-radius:12px;"></video>`
      : `<img src="${url}" />`;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightboxContent').innerHTML = '';
  }

  const URL_REGEX = /https?:\/\/[^\s<>"'()]+/g;

  async function enrichWithOGP(posts) {
    for (const p of posts) {
      const urls = [...new Set((p.body.match(URL_REGEX) || []))];
      if (urls.length === 0) continue;
      const container = document.getElementById(`link-cards-${p.id}`);
      if (!container) continue;
      for (const url of urls) {
        try {
          const res = await fetch(`${API}/ogp?url=${encodeURIComponent(url)}`);
          if (!res.ok) continue;
          const ogp = await res.json();
          if (!ogp.title) continue;
          container.insertAdjacentHTML('beforeend', renderLinkCard(ogp));
        } catch {}
      }
    }
  }

  function renderLinkCard(ogp) {
    const imgHtml = ogp.image
      ? `<div class="link-card-img"><img src="${escapeHtml(ogp.image)}" loading="lazy" /></div>`
      : '';
    return `
      <a class="link-card" href="${escapeHtml(ogp.url)}" target="_blank" rel="noopener noreferrer">
        ${imgHtml}
        <div class="link-card-body">
          ${ogp.site_name ? `<div class="link-card-site">${escapeHtml(ogp.site_name)}</div>` : ''}
          <div class="link-card-title">${escapeHtml(ogp.title)}</div>
          ${ogp.description ? `<div class="link-card-desc">${escapeHtml(ogp.description)}</div>` : ''}
          <div class="link-card-url">${escapeHtml(ogp.url)}</div>
        </div>
      </a>`;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  loadPosts();
</script>
</body>
</html>
