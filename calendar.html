<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共有カレンダー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* ヘッダー */
    .header {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 {
      font-size: 22px;
      color: #1a1a2e;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-section label { font-size: 14px; color: #666; }

    .user-section input {
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 14px;
      width: 140px;
    }

    .color-picker {
      display: flex;
      gap: 6px;
    }

    .color-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s;
    }

    .color-dot:hover { transform: scale(1.2); }
    .color-dot.selected { border-color: #333; transform: scale(1.1); }

    /* ナビゲーション */
    .nav {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 14px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav button {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 18px;
      cursor: pointer;
      color: #555;
      transition: background 0.15s;
    }

    .nav button:hover { background: #f5f5f5; }

    .nav h2 {
      font-size: 20px;
      color: #1a1a2e;
      min-width: 180px;
      text-align: center;
    }

    /* カレンダーグリッド */
    .calendar {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
    }

    .weekday {
      text-align: center;
      padding: 10px 0;
      font-size: 12px;
      font-weight: 600;
      color: #888;
    }

    .weekday.sun { color: #e74c3c; }
    .weekday.sat { color: #3498db; }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .day {
      min-height: 110px;
      border-right: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
      padding: 6px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .day:hover { background: #fafafa; }
    .day:nth-child(7n) { border-right: none; }

    .day.other-month { background: #fafafa; }
    .day.other-month .day-num { color: #ccc; }

    .day.today { background: #fff8e1; }
    .day.today .day-num {
      background: #f39c12;
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-num {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 4px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day.sun .day-num { color: #e74c3c; }
    .day.sat .day-num { color: #3498db; }
    .day.today.sun .day-num, .day.today.sat .day-num { color: white; }

    /* イベントチップ */
    .event-chip {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 2px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: white;
      font-weight: 500;
      transition: opacity 0.1s;
    }

    .event-chip:hover { opacity: 0.85; }

    .more-events {
      font-size: 11px;
      color: #888;
      padding: 1px 4px;
    }

    /* カラー定義 */
    .c-blue   { background: #3498db; }
    .c-red    { background: #e74c3c; }
    .c-green  { background: #27ae60; }
    .c-orange { background: #e67e22; }
    .c-purple { background: #9b59b6; }
    .c-teal   { background: #1abc9c; }

    /* モーダル */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal h3 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #1a1a2e;
    }

    .form-row {
      margin-bottom: 14px;
    }

    .form-row label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-row input,
    .form-row textarea,
    .form-row select {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .form-row input:focus,
    .form-row textarea:focus {
      outline: none;
      border-color: #3498db;
    }

    .form-row textarea { resize: vertical; min-height: 70px; }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-colors {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.1s;
    }

    .modal-color-dot:hover { transform: scale(1.15); }
    .modal-color-dot.selected { border-color: #333; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #3498db; color: white; }
    .btn-danger  { background: #e74c3c; color: white; }
    .btn-cancel  { background: #f0f0f0; color: #555; }

    /* イベント詳細モーダル */
    .detail-meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .detail-desc {
      font-size: 14px;
      color: #444;
      white-space: pre-wrap;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
    }

    .participants-section {
      margin-top: 12px;
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .participants-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .participants-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .participant-chip {
      font-size: 12px;
      background: #e8f4fd;
      color: #2980b9;
      border-radius: 12px;
      padding: 3px 10px;
      font-weight: 500;
    }

    .participant-chip.me {
      background: #d5f5e3;
      color: #1e8449;
    }

    .participants-empty {
      font-size: 12px;
      color: #bbb;
    }

    .btn-join   { background: #27ae60; color: white; }
    .btn-leave  { background: #95a5a6; color: white; }

    /* サブカレンダー（今月・来月） */
    .sub-cal-wrapper {
      margin-top: 16px;
    }

    .sub-cal-header {
      background: white;
      border-radius: 12px 12px 0 0;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      border-bottom: 1px solid #eee;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .sub-cal-wrapper .calendar {
      border-radius: 0 0 12px 12px;
    }

    @media (max-width: 600px) {
      .day { min-height: 70px; padding: 4px; }
      .event-chip { font-size: 10px; padding: 1px 4px; }
      .nav h2 { font-size: 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <h1>📅 共有カレンダー</h1>
    <div class="user-section">
      <label>あなたの名前:</label>
      <input type="text" id="userName" placeholder="名前を入力" maxlength="30">
      <div class="color-picker" id="userColorPicker"></div>
    </div>
  </div>

  <!-- 月ナビゲーション -->
  <div class="nav">
    <button id="prevMonth">‹</button>
    <h2 id="monthLabel"></h2>
    <button id="nextMonth">›</button>
  </div>

  <!-- カレンダー -->
  <div class="calendar">
    <div class="weekdays">
      <div class="weekday sun">日</div>
      <div class="weekday">月</div>
      <div class="weekday">火</div>
      <div class="weekday">水</div>
      <div class="weekday">木</div>
      <div class="weekday">金</div>
      <div class="weekday sat">土</div>
    </div>
    <div class="days" id="calendarDays"></div>
  </div>

  <!-- サブカレンダー（今月） -->
  <div class="sub-cal-wrapper">
    <div class="sub-cal-header" id="subLabel0"></div>
    <div class="calendar">
      <div class="weekdays">
        <div class="weekday sun">日</div>
        <div class="weekday">月</div>
        <div class="weekday">火</div>
        <div class="weekday">水</div>
        <div class="weekday">木</div>
        <div class="weekday">金</div>
        <div class="weekday sat">土</div>
      </div>
      <div class="days" id="subDays0"></div>
    </div>
  </div>

  <!-- サブカレンダー（来月） -->
  <div class="sub-cal-wrapper">
    <div class="sub-cal-header" id="subLabel1"></div>
    <div class="calendar">
      <div class="weekdays">
        <div class="weekday sun">日</div>
        <div class="weekday">月</div>
        <div class="weekday">火</div>
        <div class="weekday">水</div>
        <div class="weekday">木</div>
        <div class="weekday">金</div>
        <div class="weekday sat">土</div>
      </div>
      <div class="days" id="subDays1"></div>
    </div>
  </div>

</div>

<!-- イベント追加モーダル -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <h3 id="addModalTitle">イベントを追加</h3>
    <div class="form-row">
      <label>タイトル *</label>
      <input type="text" id="eventTitle" placeholder="例: チームミーティング" maxlength="100">
    </div>
    <div class="form-row">
      <label>日付</label>
      <input type="date" id="eventDate">
    </div>
    <div class="form-row time-row">
      <div>
        <label>開始時刻</label>
        <input type="time" id="eventStart">
      </div>
      <div>
        <label>終了時刻</label>
        <input type="time" id="eventEnd">
      </div>
    </div>
    <div class="form-row">
      <label>メモ</label>
      <textarea id="eventDesc" placeholder="詳細や場所など"></textarea>
    </div>
    <div class="form-row">
      <label>色</label>
      <div class="modal-colors" id="modalColorPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="addCancel">キャンセル</button>
      <button class="btn btn-primary" id="addSave">保存</button>
    </div>
  </div>
</div>

<!-- イベント詳細モーダル -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <h3 id="detailTitle"></h3>
    <div class="detail-meta" id="detailDate"></div>
    <div class="detail-meta" id="detailUser"></div>
    <div class="detail-desc" id="detailDesc" style="display:none"></div>
    <div class="participants-section">
      <div class="participants-label">参加者</div>
      <div class="participants-list" id="participantsList"></div>
    </div>
    <div class="modal-actions" id="detailActions"></div>
  </div>
</div>

<script>
const API = 'https://www.golfspace.jp/api/calendar';

const COLORS = [
  { key: 'blue',   hex: '#3498db' },
  { key: 'red',    hex: '#e74c3c' },
  { key: 'green',  hex: '#27ae60' },
  { key: 'orange', hex: '#e67e22' },
  { key: 'purple', hex: '#9b59b6' },
  { key: 'teal',   hex: '#1abc9c' },
];

let currentYear, currentMonth;
let events = [];
let selectedColor = 'blue';
let editingEventId = null;
let detailEventId = null;

// ========== 初期化 ==========
function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;

  const saved = localStorage.getItem('calendarUser');
  if (saved) {
    const u = JSON.parse(saved);
    document.getElementById('userName').value = u.name || '';
    selectedColor = u.color || 'blue';
  }

  renderColorPicker('userColorPicker', selectedColor, (c) => {
    selectedColor = c;
    saveUser();
  });

  document.getElementById('userName').addEventListener('input', saveUser);
  document.getElementById('prevMonth').addEventListener('click', () => { changeMonth(-1); });
  document.getElementById('nextMonth').addEventListener('click', () => { changeMonth(1); });

  document.getElementById('addCancel').addEventListener('click', closeAddModal);
  document.getElementById('addSave').addEventListener('click', saveEvent);
  document.getElementById('addOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeAddModal(); });

  document.getElementById('detailOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeDetailModal(); });

  renderModalColorPicker();
  loadEvents();
}

function saveUser() {
  localStorage.setItem('calendarUser', JSON.stringify({
    name: document.getElementById('userName').value,
    color: selectedColor,
  }));
}

// ========== カラーピッカー ==========
function renderColorPicker(containerId, current, onChange) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (c.key === current ? ' selected' : '');
    dot.style.background = c.hex;
    dot.title = c.key;
    dot.addEventListener('click', () => {
      el.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      onChange(c.key);
    });
    el.appendChild(dot);
  });
}

function renderModalColorPicker() {
  const el = document.getElementById('modalColorPicker');
  el.innerHTML = '';
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'modal-color-dot c-' + c.key + (c.key === selectedColor ? ' selected' : '');
    dot.style.background = c.hex;
    dot.dataset.color = c.key;
    dot.addEventListener('click', () => {
      el.querySelectorAll('.modal-color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
    });
    el.appendChild(dot);
  });
}

function getModalColor() {
  const sel = document.querySelector('#modalColorPicker .modal-color-dot.selected');
  return sel ? sel.dataset.color : 'blue';
}

function setModalColor(color) {
  const el = document.getElementById('modalColorPicker');
  el.querySelectorAll('.modal-color-dot').forEach(d => {
    d.classList.toggle('selected', d.dataset.color === color);
  });
}

// ========== API ==========
async function loadEvents() {
  try {
    const res = await fetch(`${API}/events?year=${currentYear}&month=${currentMonth}`);
    events = await res.json();
  } catch (e) {
    events = [];
  }
  renderCalendar();
}

async function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const date  = document.getElementById('eventDate').value;
  const user  = document.getElementById('userName').value.trim();

  if (!title) { alert('タイトルを入力してください'); return; }
  if (!date)  { alert('日付を選択してください'); return; }
  if (!user)  { alert('名前を入力してください'); return; }

  const body = {
    title,
    date,
    start_time: document.getElementById('eventStart').value || null,
    end_time:   document.getElementById('eventEnd').value   || null,
    description: document.getElementById('eventDesc').value.trim() || null,
    user_name: user,
    color: getModalColor(),
  };

  try {
    if (editingEventId) {
      await fetch(`${API}/events/${editingEventId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } else {
      await fetch(`${API}/events`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }
    closeAddModal();
    loadEvents();
  } catch (e) {
    alert('保存に失敗しました');
  }
}

async function deleteEvent(id) {
  if (!confirm('このイベントを削除しますか？')) return;
  await fetch(`${API}/events/${id}`, { method: 'DELETE' });
  closeDetailModal();
  loadEvents();
}

async function joinEvent(eventId) {
  const user = document.getElementById('userName').value.trim();
  if (!user) { alert('名前を入力してください'); return; }
  const res = await fetch(`${API}/events/${eventId}/join`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_name: user }),
  });
  const data = await res.json();
  updateParticipants(eventId, data.participants);
  loadEvents();
}

async function leaveEvent(eventId) {
  const user = document.getElementById('userName').value.trim();
  if (!user) return;
  const res = await fetch(`${API}/events/${eventId}/join`, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_name: user }),
  });
  const data = await res.json();
  updateParticipants(eventId, data.participants);
  loadEvents();
}

function updateParticipants(eventId, participants) {
  // eventsキャッシュを更新
  const ev = events.find(e => e.id === eventId);
  if (ev) ev.participants = participants;
  renderParticipants(eventId, participants);
  renderDetailActions(eventId);
}

function renderParticipants(eventId, participants) {
  const list = document.getElementById('participantsList');
  const me = document.getElementById('userName').value.trim();
  if (!participants || participants.length === 0) {
    list.innerHTML = '<span class="participants-empty">まだ参加者はいません</span>';
    return;
  }
  list.innerHTML = participants.map(p =>
    `<span class="participant-chip${p === me ? ' me' : ''}">${p === me ? '✓ ' : ''}${p}</span>`
  ).join('');
}

function renderDetailActions(eventId) {
  const ev = events.find(e => e.id === eventId);
  if (!ev) return;
  const me = document.getElementById('userName').value.trim();
  const isOwner = ev.user_name === me;
  const isParticipant = (ev.participants || []).includes(me);

  const actions = document.getElementById('detailActions');
  actions.innerHTML = '';

  // 閉じるボタン（常に表示）
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn btn-cancel';
  closeBtn.textContent = '閉じる';
  closeBtn.addEventListener('click', closeDetailModal);
  actions.appendChild(closeBtn);

  if (isOwner) {
    // 作成者：編集・削除
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-primary';
    editBtn.textContent = '編集';
    editBtn.addEventListener('click', openEditFromDetail);
    actions.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', () => deleteEventFromDetail(eventId));
    actions.appendChild(delBtn);
  } else {
    // 他人のイベント：参加 or キャンセル
    if (isParticipant) {
      const leaveBtn = document.createElement('button');
      leaveBtn.className = 'btn btn-leave';
      leaveBtn.textContent = '参加をキャンセル';
      leaveBtn.addEventListener('click', () => leaveEvent(eventId));
      actions.appendChild(leaveBtn);
    } else {
      const joinBtn = document.createElement('button');
      joinBtn.className = 'btn btn-join';
      joinBtn.textContent = '参加する';
      joinBtn.addEventListener('click', () => joinEvent(eventId));
      actions.appendChild(joinBtn);
    }
  }
}

// ========== カレンダー描画 ==========
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  loadEvents();
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent =
    `${currentYear}年 ${currentMonth}月`;

  const grid = document.getElementById('calendarDays');
  grid.innerHTML = '';

  const first = new Date(currentYear, currentMonth - 1, 1);
  const last  = new Date(currentYear, currentMonth, 0);
  const today = new Date();
  const todayStr = toDateStr(today);

  // 月初の曜日 (0=日)
  let startDow = first.getDay();

  // 前月の日を埋める
  const prevLast = new Date(currentYear, currentMonth - 1, 0);
  for (let i = startDow - 1; i >= 0; i--) {
    const d = prevLast.getDate() - i;
    appendDay(grid, d, true, null, -1);
  }

  // 当月
  for (let d = 1; d <= last.getDate(); d++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvents = events.filter(e => e.date === dateStr);
    const dow = new Date(currentYear, currentMonth - 1, d).getDay();
    appendDay(grid, d, false, dayEvents, dow, dateStr, dateStr === todayStr);
  }

  // 翌月の日を埋める（6行になるよう調整）
  const total = startDow + last.getDate();
  const remaining = Math.ceil(total / 7) * 7 - total;
  for (let d = 1; d <= remaining; d++) {
    appendDay(grid, d, true, null, -1);
  }
}

function appendDay(grid, dayNum, otherMonth, dayEvents, dow, dateStr, isToday) {
  const cell = document.createElement('div');
  cell.className = 'day'
    + (otherMonth ? ' other-month' : '')
    + (isToday    ? ' today' : '')
    + (dow === 0  ? ' sun' : dow === 6 ? ' sat' : '');

  const numEl = document.createElement('div');
  numEl.className = 'day-num';
  numEl.textContent = dayNum;
  cell.appendChild(numEl);

  if (!otherMonth && dateStr) {
    cell.addEventListener('click', () => openAddModal(dateStr));

    const MAX = 3;
    (dayEvents || []).slice(0, MAX).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = `event-chip c-${ev.color}`;
      chip.textContent = (ev.start_time ? ev.start_time.slice(0,5) + ' ' : '') + ev.title;
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        openDetailModal(ev);
      });
      cell.appendChild(chip);
    });

    if ((dayEvents || []).length > MAX) {
      const more = document.createElement('div');
      more.className = 'more-events';
      more.textContent = `+${dayEvents.length - MAX}件`;
      cell.appendChild(more);
    }
  }

  grid.appendChild(cell);
}

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ========== モーダル ==========
function openAddModal(dateStr) {
  editingEventId = null;
  document.getElementById('addModalTitle').textContent = 'イベントを追加';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventDate').value  = dateStr;
  document.getElementById('eventStart').value = '';
  document.getElementById('eventEnd').value   = '';
  document.getElementById('eventDesc').value  = '';
  setModalColor(selectedColor);
  document.getElementById('addOverlay').classList.add('open');
  document.getElementById('eventTitle').focus();
}

function closeAddModal() {
  editingEventId = null;
  document.getElementById('addOverlay').classList.remove('open');
}

function openDetailModal(ev) {
  detailEventId = ev.id;
  const colorHex = COLORS.find(c => c.key === ev.color)?.hex || '#999';

  document.getElementById('detailTitle').textContent = ev.title;

  const dateEl = document.getElementById('detailDate');
  let dateText = ev.date;
  if (ev.start_time) dateText += '  ' + ev.start_time.slice(0,5);
  if (ev.end_time)   dateText += ' 〜 ' + ev.end_time.slice(0,5);
  dateEl.innerHTML = `<div class="detail-dot" style="background:${colorHex}"></div> ${dateText}`;

  document.getElementById('detailUser').textContent = '👤 ' + ev.user_name;

  const descEl = document.getElementById('detailDesc');
  if (ev.description) {
    descEl.textContent = ev.description;
    descEl.style.display = 'block';
  } else {
    descEl.style.display = 'none';
  }

  renderParticipants(ev.id, ev.participants || []);
  renderDetailActions(ev.id);

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detailOverlay').classList.remove('open');
}

function openEditFromDetail() {
  const ev = events.find(e => e.id === detailEventId);
  if (!ev) return;
  closeDetailModal();

  editingEventId = ev.id;
  document.getElementById('addModalTitle').textContent = 'イベントを編集';
  document.getElementById('eventTitle').value = ev.title;
  document.getElementById('eventDate').value  = ev.date;
  document.getElementById('eventStart').value = ev.start_time || '';
  document.getElementById('eventEnd').value   = ev.end_time   || '';
  document.getElementById('eventDesc').value  = ev.description || '';
  setModalColor(ev.color);
  document.getElementById('addOverlay').classList.add('open');
}

function deleteEventFromDetail(eventId) {
  deleteEvent(eventId || detailEventId);
}

// ========== サブカレンダー（今月・来月） ==========
async function loadSubCalendars() {
  const now = new Date();
  const months = [
    { year: now.getFullYear(), month: now.getMonth() + 1 },
  ];
  let ny = now.getFullYear(), nm = now.getMonth() + 2;
  if (nm > 12) { nm = 1; ny++; }
  months.push({ year: ny, month: nm });

  for (let i = 0; i < 2; i++) {
    const { year, month } = months[i];
    let evs = [];
    try {
      const res = await fetch(`${API}/events?year=${year}&month=${month}`);
      evs = await res.json();
    } catch { evs = []; }
    renderSubCalendar(i, year, month, evs);
  }
}

function renderSubCalendar(idx, year, month, evs) {
  document.getElementById(`subLabel${idx}`).textContent = `${year}年 ${month}月`;

  const grid = document.getElementById(`subDays${idx}`);
  grid.innerHTML = '';

  const first = new Date(year, month - 1, 1);
  const last  = new Date(year, month, 0);
  const today = new Date();
  const todayStr = toDateStr(today);
  const startDow = first.getDay();

  const prevLast = new Date(year, month - 1, 0);
  for (let i = startDow - 1; i >= 0; i--) {
    appendDay(grid, prevLast.getDate() - i, true, null, -1);
  }

  for (let d = 1; d <= last.getDate(); d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvents = evs.filter(e => e.date === dateStr);
    const dow = new Date(year, month - 1, d).getDay();
    appendDay(grid, d, false, dayEvents, dow, dateStr, dateStr === todayStr);
  }

  const total = startDow + last.getDate();
  const remaining = Math.ceil(total / 7) * 7 - total;
  for (let d = 1; d <= remaining; d++) {
    appendDay(grid, d, true, null, -1);
  }
}

// ========== 起動 ==========
init();
loadSubCalendars();
</script>
